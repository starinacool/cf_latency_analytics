name = "cf-latency-analytics"
main = "src/index.js"
compatibility_date = "2024-03-27"

[build]
command = "npm install && npm run build"
cwd = "frontend"
watch_dir = "frontend/src"

[assets]
directory = "./frontend/dist"
binding = "ASSETS"

[vars]
# Add these in the Cloudflare Dashboard or via wrangler secret put
# CLOUDFLARE_API_TOKEN = "..."
# CLOUDFLARE_ZONE_ID = "..."
# CLOUDFLARE_EMAIL = "..."
